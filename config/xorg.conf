Section "ServerFlags"
    Option "AutoAddGPU" "true"
EndSection

Section "OutputClass"
    Identifier "HyperV"
    MatchDriver "hyperv_drm"
    Driver "modesetting"
EndSection

Section "Screen"
    Identifier "Default Screen"
    DefaultDepth 24
    SubSection "Display"
        Depth 24
        Virtual 1920 1080
    EndSubSection
EndSection
