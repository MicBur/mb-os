# MB-OS Calamares Settings
---
modules-search: [ local ]

sequence:
  - show:
    - welcome
    - locale
    - keyboard
    - partition
    - users
    - summary
  - exec:
    - partition
    - mount
    - unpackfs
    - machineid
    - fstab
    - locale
    - keyboard
    - localecfg
    - users
    - displaymanager
    - networkcfg
    - hwclock
    - services-systemd
    - bootloader
    - grubcfg
    - shellprocess
    - umount
  - show:
    - finished

branding: mb-os

prompt-install: true
dont-chroot: false
